# Runs on every push and PR: lint, API typecheck, tests, production build.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: Typecheck API (server)
        run: npm run typecheck:api

      - name: Typecheck App (frontend)
        run: tsc -p tsconfig.app.json --noEmit

      - name: Tests
        run: npm run test

      - name: Production build
        run: npm run build