# Optional: local PostgreSQL for development.
# Production runs on Neon — this is only needed if you prefer a local DB over a cloud one.
#
# Usage:
#   docker compose up -d
#   Then set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/neondb in your .env

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: irace-postgres
    environment:
      POSTGRES_DB: neondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neondb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
