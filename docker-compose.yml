version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: race-postgres
    environment:
      POSTGRES_DB: race_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d irace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and real-time features
  redis:
    image: redis:7-alpine
    container_name: race-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # React Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: race-app
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/race_app
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:5173
      - NEXTAUTH_SECRET=your-nextauth-secret-key-here
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    restart: unless-stopped

  # Development version (uncomment for development)
  # app-dev:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   container_name: irace-app-dev
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=development
  #     - DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/irace
  #     - REDIS_URL=redis://redis:6379
  #     - NEXTAUTH_URL=http://localhost:3000
  #     - NEXTAUTH_SECRET=your-nextauth-secret-key-here
  #     - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
  #     - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./src:/app/src
  #     - ./public:/app/public
  #     - ./node_modules:/app/node_modules
  #   command: npm run dev

volumes:
  postgres_data:
  redis_data:
